<script>
// Mark when all images are loaded so the renderer waits for them.
window._socialReady = false;
(async () => {
  const imgs = Array.from(document.querySelectorAll('img'));
  await Promise.all(imgs.map(img => {
    if (img.complete && img.naturalWidth) return Promise.resolve();
    return new Promise(r => { img.onload = r; img.onerror = r; });
  }));
  // Allow a beat for layout to settle after image loads
  await new Promise(r => setTimeout(r, 200));
  window._socialReady = true;
  document.title = (document.title || '') + ' · ready';
})();

// Render to PNG via html2canvas and return a data URL.
// Called by the Chrome MCP javascript_tool after _socialReady is true.
window.renderSocialPng = async function() {
  if (typeof html2canvas !== 'function') {
    return { error: 'html2canvas not loaded' };
  }
  if (!window._socialReady) {
    return { error: 'images not loaded yet; wait and retry' };
  }
  const target = document.getElementById('render-target');
  const canvas = await html2canvas(target, {
    width: 1080,
    height: 1080,
    scale: 1,
    backgroundColor: '#ffffff',
    useCORS: true,
    allowTaint: false,
    logging: false,
  });
  return new Promise(resolve => {
    canvas.toBlob(async (blob) => {
      const buf = await blob.arrayBuffer();
      const bytes = new Uint8Array(buf);
      // Chunked base64 to avoid call stack overflow on large arrays
      let bin = '';
      const CHUNK = 0x8000;
      for (let i = 0; i < bytes.length; i += CHUNK) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
      }
      resolve({ base64: btoa(bin), bytes: bytes.length });
    }, 'image/png');
  });
};

// Render and upload directly to GitHub. Token + path are passed in.
window.renderAndUpload = async function(token, repo, branch, path) {
  const r = await window.renderSocialPng();
  if (r.error) return r;
  // Check for existing SHA so we can overwrite
  let sha = null;
  try {
    const head = await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`, {
      headers: { Authorization: `Bearer ${token}`, 'X-GitHub-Api-Version': '2022-11-28', Accept: 'application/vnd.github+json' }
    });
    if (head.ok) {
      const data = await head.json();
      sha = data.sha;
    }
  } catch (e) {}
  const body = {
    message: `Publish social asset: ${path}`,
    content: r.base64,
    branch: branch,
  };
  if (sha) body.sha = sha;
  const put = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'X-GitHub-Api-Version': '2022-11-28', 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' },
    body: JSON.stringify(body),
  });
  const result = await put.json();
  return {
    status: put.status,
    bytes: r.bytes,
    url: put.ok ? `https://flyers.joshhanoud.com/${path}` : null,
    error: put.ok ? null : (result.message || JSON.stringify(result)),
  };
};
</script>
